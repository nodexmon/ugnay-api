services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ugnay_test
      POSTGRES_USER: ugnay_test
      POSTGRES_PASSWORD: ugnay_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ugnay_test -d ugnay_test"]
      interval: 5s
      timeout: 5s
      retries: 10
