overrides:
  # Security: force patched multer (GHSA-72gw-mp4g-v24j — DoS via nested field
  # names). @nestjs/platform-express otherwise pulls in a vulnerable 2.1.1.
  multer: '>=2.2.0'

allowBuilds:
  '@prisma/engines': true
  '@scarf/scarf': false
  bcrypt: true
  esbuild: true
  prisma: true
  unrs-resolver: true
